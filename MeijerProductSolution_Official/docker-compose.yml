services:
  productinfo-api:
    build:
      context: .
      dockerfile: ProductInfo.Api/Dockerfile
    container_name: productinfo-api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      DataSource__Provider: Json
      DataSource__AutoMigrate: "false"

  productinfo-api-sql:
    build:
      context: .
      dockerfile: ProductInfo.Api/Dockerfile
    container_name: productinfo-api-sql
    profiles: ["sql"]
    ports:
      - "5001:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      DataSource__Provider: SqlServer
      DataSource__AutoMigrate: "true"
      ConnectionStrings__ProductDb: Server=sqlserver,1433;Database=ProductInfoDb;User Id=sa;Password=Your_strong_password123;TrustServerCertificate=True;MultipleActiveResultSets=True
    depends_on:
      sqlserver:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: productinfo-sqlserver
    profiles: ["sql"]
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: Your_strong_password123
      MSSQL_PID: Developer
    volumes:
      - productinfo-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_strong_password123 -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  productinfo-sql-data:
