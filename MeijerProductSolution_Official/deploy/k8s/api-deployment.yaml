apiVersion: apps/v1
kind: Deployment
metadata:
  name: productinfo-api
  namespace: productinfo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: productinfo-api
  template:
    metadata:
      labels:
        app: productinfo-api
    spec:
      containers:
        - name: productinfo-api
          image: productinfo-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: productinfo-api-config
            - secretRef:
                name: sqlserver-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
